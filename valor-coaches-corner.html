<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaches Corner | Virginia Valor FC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#A39964;
    --gold-deep:#8a8052;
    --ink:#2F2E2E;
    --page:#F0EDE8;
    --card:#FFFFFF;
    --line:#E2DDD3;
    --muted:#7C776E;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Barlow',system-ui,sans-serif;
    background:var(--page);
    color:var(--ink);
    line-height:1.5;
    min-height:100vh;
  }

  /* Header */
  .hdr{
    background:var(--ink);
    color:#fff;
    padding:22px 20px 0;
  }
  .hdr-inner{max-width:980px;margin:0 auto;padding-bottom:18px}
  .club{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:13px;
    color:var(--gold);
  }
  .title{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:30px;
    letter-spacing:.01em;
    line-height:1.1;
    margin-top:2px;
  }
  .underline{
    height:4px;
    background:linear-gradient(90deg,var(--gold) 0%,var(--gold-deep) 60%,rgba(163,153,100,0) 100%);
  }

  /* Welcome */
  .wrap{max-width:980px;margin:0 auto;padding:26px 20px 48px}
  .welcome{
    font-family:'Oswald',sans-serif;
    font-weight:500;
    font-size:21px;
    margin-bottom:4px;
  }
  .sub{
    font-family:'Barlow',sans-serif;
    color:var(--muted);
    font-size:15px;
    margin-bottom:24px;
    max-width:60ch;
  }

  /* Cards */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:18px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:22px 20px 20px;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
    transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background:var(--gold);
  }
  .card.soon::before{background:var(--line)}
  .card:not(.soon):hover{
    border-color:var(--gold);
    box-shadow:0 6px 20px rgba(47,46,46,.08);
    transform:translateY(-2px);
  }
  .pill{
    align-self:flex-start;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.1em;
    font-size:11px;
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:14px;
  }
  .pill.active{background:rgba(163,153,100,.16);color:var(--gold-deep)}
  .pill.soon{background:#ECE9E2;color:var(--muted)}
  .card h2{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:19px;
    line-height:1.2;
    margin-bottom:8px;
  }
  .card p{
    font-size:14.5px;
    color:#544f47;
    margin-bottom:20px;
    flex:1;
  }
  .cta{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    font-size:15px;
    text-decoration:none;
    padding:11px 16px;
    border-radius:8px;
    background:var(--ink);
    color:#fff;
    border:1px solid var(--ink);
    touch-action:manipulation;
    transition:background .15s ease, color .15s ease;
  }
  .cta:hover{background:var(--gold);border-color:var(--gold);color:var(--ink)}
  .cta:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .cta.disabled{
    background:#ECE9E2;
    color:var(--muted);
    border-color:var(--line);
    cursor:default;
    pointer-events:none;
  }
  .arrow{font-size:16px;line-height:1}

  /* Help footer */
  .help{
    margin-top:30px;
    padding-top:20px;
    border-top:1px solid var(--line);
    font-size:14.5px;
    color:var(--muted);
  }
  .help a{color:var(--gold-deep);font-weight:600;text-decoration:none}
  .help a:hover{text-decoration:underline}

  @media (max-width:600px){
    .title{font-size:25px}
    .wrap{padding:22px 16px 40px}
    .hdr{padding:18px 16px 0}
    .grid{grid-template-columns:1fr}
  }
  @media (prefers-reduced-motion:reduce){
    .card,.cta{transition:none}
    .card:not(.soon):hover{transform:none}
  }
</style>
</head>
<body>
  <header class="hdr">
    <div class="hdr-inner">
      <div class="club">Virginia Valor FC</div>
      <div class="title">Coaches Corner</div>
    </div>
  </header>
  <div class="underline"></div>

  <main class="wrap">
    <div class="welcome" id="welcome">Welcome, Coach</div>
    <p class="sub">Your hub for club coaching tools. Pick a tool below to get started. More is on the way.</p>

    <section class="grid" id="grid" aria-label="Coaching tools"></section>

    <div class="help">
      Need help? Contact
      <a href="mailto:bmorris@virginiavalorfc.org">Beth Morris</a>
      or
      <a href="mailto:dsutherland@virginiavalorfc.org">Dylan Sutherland</a>.
    </div>
  </main>

<script>
  // ---- CONFIG: fill these in after deploying each tool ----
  var TOOLS = [
    {
      key: 'tournament',
      title: 'Tournament Guidance & Selection',
      desc: "Choose your team's tournaments for the season and submit them to Beth Morris for approval.",
      status: 'Season Active',
      url: 'https://virginiavalorfc.org/valortournamentrecommendations',
      cta: 'Open Tool'
    },
    {
      key: 'reimbursement',
      title: 'Travel Reimbursement',
      desc: 'Submit travel reimbursement for tournaments 90+ miles away with a hotel stay. Beth calculates totals from your receipts.',
      status: 'Open',
      url: 'PASTE_REIMBURSEMENT_URL_HERE',
      cta: 'Open Tool'
    },
    {
      key: 'fundraising',
      title: 'Team Fundraising',
      desc: 'Submit fundraising plans and track your team fund balance. Square donation links only.',
      status: 'Coming Soon',
      url: '',
      cta: 'Coming Soon',
      soon: true
    }
  ];

  function esc(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function render(){
    var grid = document.getElementById('grid');
    var html = '';
    for (var i = 0; i < TOOLS.length; i++){
      var t = TOOLS[i];
      var soon = !!t.soon;
      var ready = !soon && t.url && t.url.indexOf('PASTE_') === -1;
      var pillClass = soon ? 'soon' : 'active';
      var button;
      if (soon){
        button = '<span class="cta disabled">' + esc(t.cta) + '</span>';
      } else if (ready){
        button = '<a class="cta" href="' + esc(t.url) + '" target="_blank" rel="noopener">' +
                 esc(t.cta) + ' <span class="arrow" aria-hidden="true">&rarr;</span></a>';
      } else {
        // URL not filled in yet: show a clearly inert button so nothing looks broken
        button = '<span class="cta disabled">Link Pending</span>';
      }
      html += '<article class="card' + (soon ? ' soon' : '') + '">' +
                '<span class="pill ' + pillClass + '">' + esc(t.status) + '</span>' +
                '<h2>' + esc(t.title) + '</h2>' +
                '<p>' + esc(t.desc) + '</p>' +
                button +
              '</article>';
    }
    grid.innerHTML = html;
  }

  function setWelcome(firstName){
    var el = document.getElementById('welcome');
    if (firstName && String(firstName).trim()){
      el.textContent = 'Welcome, ' + String(firstName).trim();
    } else {
      el.textContent = 'Welcome, Coach';
    }
  }

  // ---- Coach name resolution ----
  // Priority: 1) postMessage from Wix parent  2) ?firstName= / ?name= URL param  3) generic
  function readParam(){
    try {
      var p = new URLSearchParams(window.location.search);
      return p.get('firstName') || p.get('name') || '';
    } catch (e){
      return '';
    }
  }

  function init(){
    render();

    var fromParam = readParam();
    if (fromParam) setWelcome(fromParam);

    // Listen for the Wix parent (Velo) handing us the member's details.
    window.addEventListener('message', function(event){
      var d = event && event.data;
      if (d && typeof d === 'object' && (d.firstName || d.name)){
        setWelcome(d.firstName || d.name);
      }
    });

    // Tell the Wix parent the iframe is loaded so it can post the member info.
    try {
      if (window.parent && window.parent !== window){
        window.parent.postMessage('tool-ready', '*');
      }
    } catch (e){ /* not embedded, ignore */ }
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
